name: Weekly scrape

on:
  # Mandag morgen kl. 06:00 dansk tid.
  # Cron er i UTC: 05:00 UTC = 06:00 CET (vinter) / 07:00 CEST (sommer).
  # Vi accepterer 1-times skift hen over året — alternativt to triggers.
  schedule:
    - cron: "0 5 * * 1"
  # Tillad manuel trigger fra GitHub UI ("Actions" → "Run workflow")
  workflow_dispatch:

# Tillad at jobbet skriver til repoet (committer rapporten bagefter)
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full scrape
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m topas_scraper.cli scrape

      - name: Generate weekly markdown report
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p outputs
          python -m topas_scraper.weekly_report --out outputs/weekly_report.md --lookback 7

      - name: Commit weekly report back to repo
        # Kun hvis rapporten faktisk ændrede sig
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/weekly_report.md
          if git diff --cached --quiet; then
            echo "No changes to weekly report — skipping commit"
          else
            git commit -m "Weekly scrape $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: Upload report as workflow artifact
        # Backup: gemmer rapporten som artifact (90 dage retention) selv hvis commit-step skippes
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_id }}
          path: outputs/weekly_report.md
          retention-days: 90
          if-no-files-found: warn
