# Streamlit theme — matches the muted gray/blue palette from the static dashboard.
[theme]
base = "light"
primaryColor = "#2a3a5c"
backgroundColor = "#fbfbfa"
secondaryBackgroundColor = "#ffffff"
textColor = "#1a1f2e"
font = "sans serif"

[server]
# fileWatcherType = "none": slår file-system watcher fra. Default er "auto"
# som bruger Linux inotify, men Streamlit Cloud's delte host har en
# inotify-watch-limit som vi rammer (alle pages × subfolders × pycache).
# Resultat: loggene flooder med ENOSPC stack traces og kan i værste fald
# forstyrre andre operationer. Vi behøver ikke hot-reload på cloud.
fileWatcherType = "none"
# Helps with iframe-embedded usage if we ever need it
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false
